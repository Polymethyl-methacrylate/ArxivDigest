# For physics topics, use the specific subtopics, e.g. "Astrophysics"
topic: "Computer Science"

# Use the natural language names of the topics found on arXiv.
categories:
  - "Artificial Intelligence"
  - "Machine Learning"
  - "Robotics"
  - "Computer Vision and Pattern Recognition"
  - "Computation and Language"

# Relevance score threshold. abstracts that receive a score less than this from the large language model
# will have their papers filtered out.
#
# Must be within 1-10
threshold: 7

# A natural language statement that the large language model will use to judge which papers are relevant 
#
# For example:
#     "I am interested in complexity theory papers that establish upper bounds"
#     "gas chromatography, mass spectrometry"
#     "making lots of money"
#
# This can be empty, which just return a full list of papers with no judgement or filtering,
# in whatever order arXiv responds with.
interest: |
  1.I am interested in robot learning and embodied AI, especially reinforcement
  learning for robotics, sim-to-real transfer, humanoid and legged locomotion,
  terrain-adaptive and vision-based locomotion, whole-body control, motion
  tracking, motion imitation, motion retargeting, and loco-manipulation.

  2.I am also interested in general-purpose robot controllers, robot foundation
  models, large-scale robot data, imitation learning, offline RL, diffusion
  policies, and multimodal robot learning, including vision-language-action
  and whole-body VLA models.

  3.Prioritize papers with relevance to real-world robot deployment, robustness,
  contact-rich control, and learning-based control for humanoids or quadrupeds.

  4.Do not prioritize language-specific NLP, text-only applications such as
  information extraction or summarization, or purely theoretical RL without
  clear relevance to robotics or embodied agents.
